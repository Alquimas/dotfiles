# Force 256 color terminal
set -g default-terminal "tmux-256color"

# History settings
set-option -g history-limit 10000
set-option -g history-file ~/.tmux/tmuxhistory

# Activity
set-option -g monitor-activity on
set-option -g visual-activity off

# Renumber windows when one is closed
set-option -g renumber-windows on

######## KEYBINDINGS ########

# Set C-a to be the new prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Open new splits in cwd
# Change keybinds to split
bind '-' split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux Reloaded"

# switch panes using Alt-arrow without prefix
# Tmux modes when?
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Use vim key bindings
set-option -g mode-keys vi
set-option -g status-keys vi

# Send copied text to clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

############################

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Only runs .zshrc on startup
set -g default-command "${SHELL}"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on


# Enables mouse
set -g mouse on

######## STYLE ########

set -g pane-border-style 'fg=colour1'
set -g pane-active-border-style 'fg=colour3'

# statusbar
set -g status on
set -g status-position top
set -g status-justify left
set -g status-style 'fg=#FFFFFF, bg=#AAAAAA'
set -g status-left ' #S '
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50
set -g status-left-length 10

setw -g window-status-current-style 'fg=colour0 bg=colour1 bold'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=colour1 dim'
setw -g window-status-format ' #I #[fg=colour7]#W #[fg=colour1]#F '

######## RESSURECT ########

run-shell ~/.config/tmux/ressurect/resurrect.tmux
