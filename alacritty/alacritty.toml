import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]

[env]
    TERM = "xterm-256color"

[window]
    decorations = "full"
    dynamic_title = false
    opacity = 0.65

    [window.dimensions]
        columns = 80
        lines = 24

    [window.padding]
        x = 0
        y = 0

[scrolling]
    history = 5_000
    multiplier = 3

[font.normal]
    family = "FiraCode Nerd Font Mono"
    style = "Regular"

[font.bold]
    family = "FiraCode Nerd Font Mono"
    style = "Bold"

[font.italic]
    family = "FiraCode Nerd Font Mono"
    style = "Italic"

[font.bold_italic]
    family = "FiraCode Nerd Font Mono"
    style = "Bold Italic"
